apiVersion: eaas.envmgmt.io/v1
kind: Environment
metadata:
  name: env-multi-terraform
  project: akshay-2
spec:
  agents:
  - name: agent-11jun
  envVars:
  - key: env1
    options:
      override:
        multiSelect: true
        restrictedValues:
        - env1val1
        - env1val2
        - env1val3
        type: restricted
    value: '["env1val1","env1val2"]'
  - key: env2
    options:
      override:
        multiSelect: true
        restrictedKeyValues:
          key1: env2val1
          key2: env2val2
          key3: env2val3
        type: restricted_key_values
    value: '["key1","key2"]'
  template:
    name: et-multi
    version: v1
    versionState: unspecified
  variables:
  - name: iv1-text
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedValues:
        - val1
        - val2
        - val3
        type: restricted
    value: '["val1","val2"]'
    valueType: text
  - name: inv3-exp
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedValues:
        - '#{environment.name}#'
        - '#{environment.project.name}#'
        - '#{organization.name}#'
        type: restricted
    value: '["#{environment.name}#","#{environment.project.name}#"]'
    valueType: expression
  - name: inv2-json
    options:
      override:
        multiSelect: true
        restrictedValues:
        - val1
        - val2
        - val3
        type: restricted
    value: '["val1","val2"]'
    valueType: json
  - name: iv4-text
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedKeyValues:
          key1: val1
          key2: val2
          key3: val3
        type: restricted_key_values
    value: '["key1","key2"]'
    valueType: text
  - name: iv5-exp
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedKeyValues:
          env_name: '#{environment.name}#'
          org_name: '#{organization.name}#'
          project_name: '#{environment.project.name}#'
        type: restricted_key_values
    value: '["env_name","org_name"]'
    valueType: expression
  - name: iv6-json
    options:
      override:
        multiSelect: true
        restrictedKeyValues:
          key1: val1
          key2: val2
          key3: val3
        type: restricted_key_values
    value: '["key1","key2"]'
    valueType: json
