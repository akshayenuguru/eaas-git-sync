apiVersion: eaas.envmgmt.io/v1
kind: Environment
metadata:
  name: env
  project: akshay
spec:
  agents:
  - name: agent-kr-tb
  envVars:
  - key: ev2
    options:
      override:
        multiSelect: true
        restrictedKeyValues:
          ev21: ev21
          ev22: ev22
          ev23: ev23
        type: restricted_key_values
    value: '["ev21","ev22","ev23"]'
  - key: ev1
    options:
      override:
        multiSelect: true
        restrictedValues:
        - ev11
        - ev12
        - ev13
        type: restricted
    value: '["ev11","ev12","ev13"]'
  template:
    name: et1
    version: v1
    versionState: unspecified
  variables:
  - name: iv1
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedValues:
        - a
        - b
        - c
        type: restricted
    value: '["a","b","c"]'
    valueType: text
  - name: iv2
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedKeyValues:
          rkv1: one
          rkv2: two
          rkv3: three
        type: restricted_key_values
    value: '["rkv1","rkv2","rkv3"]'
    valueType: text
  - name: iv3
    options:
      displayMetadata: {}
      override:
        restrictedValues:
        - "11"
        - "1"
        - "111"
        type: restricted
    value: "1"
    valueType: expression
  - name: iv4
    options:
      displayMetadata: {}
      override:
        restrictedKeyValues:
          exp1: '#{environment.id}#'
          exp2: '#{environment.name}#'
          exp3: '#{environment.project.name}#'
        type: restricted_key_values
    value: exp2
    valueType: expression
