apiVersion: eaas.envmgmt.io/v1
kind: Environment
metadata:
  name: env2
  project: akshay
spec:
  agents:
  - name: agent-kr-tb
  template:
    name: et1
    version: v1
    versionState: unspecified
  variables:
  - name: iv1
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedValues:
        - a
        - b
        - c
        type: restricted
    value: '["a","b","c"]'
    valueType: text
  - name: iv2
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedKeyValues:
          rkv1: one
          rkv2: two
          rkv3: three
        type: restricted_key_values
    value: '["rkv1","rkv2","rkv3"]'
    valueType: text
  - name: iv3
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedValues:
        - "11"
        - "1"
        - "111"
        - "1111"
        type: restricted
    value: '["1","11","111","1111"]'
    valueType: expression
  - name: iv4
    options:
      displayMetadata: {}
      override:
        restrictedKeyValues:
          exp1: '#{environment.id}#'
          exp2: '#{environment.name}#'
          exp3: '#{environment.project.name}#'
        type: restricted_key_values
    value: exp1
    valueType: expression
