apiVersion: eaas.envmgmt.io/v1
kind: WorkflowHandler
metadata:
  annotations:
    eaas.envmgmt.io/releaseversion: v3.1.40
  name: process-paas-event-v3-1-40
  project: system-catalog
spec:
  config:
    function:
      image: registry.rafay-edge.net/rafay/m360-process-event:v3.1.40-3
      kubeOptions:
        securityContext:
          readOnlyRootFileSystem: false
      language: python
      name: process-event
      skipBuild: true
      targetPlatforms:
      - linux/amd64
    timeoutSeconds: 600
    type: function
  inputs:
  - name: billing-config
  - name: contract-name-to-id
  - name: rafay-creds
  - name: m360-settings
  sharing:
    enabled: true
    projects:
    - name: '*'
