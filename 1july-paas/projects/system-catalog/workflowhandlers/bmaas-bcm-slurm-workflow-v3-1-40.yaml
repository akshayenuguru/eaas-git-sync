apiVersion: eaas.envmgmt.io/v1
kind: WorkflowHandler
metadata:
  annotations:
    eaas.envmgmt.io/releaseversion: v3.1.40
  description: NVIDIA BCM Slurm Workflow Driver
  name: bmaas-bcm-slurm-workflow-v3-1-40
  project: system-catalog
spec:
  config:
    function:
      cpuLimitMilli: "1000"
      image: registry.rafay-edge.net/rafay/bcm-slurm-driver:v3.1.40-6
      imagePullCredentials: {}
      language: python
      memoryLimitMb: "2048"
      name: bmaas-bcm-slurm-workflow
      skipBuild: true
      targetPlatforms:
      - linux/amd64
    timeoutSeconds: 10800
    type: function
  inputs:
  - data:
      envs:
      - key: BCM_SLURM_DEBUG
        value: "false"
      variables:
      - name: action
        options:
          override:
            type: allowed
        value: |-
          ## script begin ##
          def eval(**ctx):
            action_name = ctx["trigger"]["payload"].get("action_name")
            if action_name:
              return action_name
            return ctx["trigger"]["payload"].get("action")
          ## script end ##
        valueType: expression
    name: input
  sharing:
    enabled: true
    projects:
    - name: '*'
