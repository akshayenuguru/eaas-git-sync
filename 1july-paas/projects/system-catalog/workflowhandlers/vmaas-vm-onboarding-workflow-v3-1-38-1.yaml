apiVersion: eaas.envmgmt.io/v1
kind: WorkflowHandler
metadata:
  name: vmaas-vm-onboarding-workflow-v3-1-38-1
  project: system-catalog
spec:
  config:
    function:
      image: registry.rafay-edge.net/rafay/vmaas-vm-mgmt:v3.1.38-4
      language: python
      name: vmaas-vm-onboarding
      skipBuild: true
      targetPlatforms:
      - linux/amd64
    timeoutSeconds: 600
    type: function
  inputs:
  - data:
      variables:
      - name: action
        options:
          override:
            type: allowed
        value: |-
          ## script begin ##
          def eval(**ctx):
            action_name = ctx["trigger"]["payload"].get("action_name")
            if action_name:
              return action_name
            return ctx["trigger"]["payload"].get("action")
          ## script end ##
        valueType: expression
    name: input
