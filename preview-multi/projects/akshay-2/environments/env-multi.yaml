apiVersion: eaas.envmgmt.io/v1
kind: Environment
metadata:
  name: env-multi
  project: akshay-2
spec:
  envVars:
  - key: ev1
    options:
      override:
        restrictedValues:
        - env1val1
        - env2val2
        - env3val3
        type: restricted
    value: env1val1
  - key: ev2
    options:
      override:
        restrictedKeyValues:
          env2val1: one
          env2val2: two
          env2val3: three
        type: restricted_key_values
    value: env2val1
  template:
    name: et-multi
    version: v1
    versionState: unspecified
  variables:
  - name: iv1-text
    options:
      override:
        restrictedValues:
        - val1
        - val2
        - val3
        type: restricted
    value: val1
    valueType: text
  - name: inv2-json
    options:
      override:
        restrictedValues:
        - val1
        - val2
        - val3
        type: restricted
    value: val1
    valueType: json
  - name: inv3-exp
    options:
      displayMetadata: {}
      override:
        restrictedValues:
        - '#{environment.name}#'
        - '#{environment.project.name}#'
        - '#{organization.name}#'
        type: restricted
    value: '#{environment.name}#'
    valueType: expression
  - name: iv4-text
    options:
      override:
        restrictedKeyValues:
          key1: val1
          key2: val2
          key3: val3
        type: restricted_key_values
    value: key1
    valueType: text
  - name: iv6-json
    options:
      displayMetadata: {}
      override:
        restrictedKeyValues:
          key1: val1
          key2: val2
          key3: val3
        type: restricted_key_values
    value: key3
    valueType: json
  - name: iv5-exp
    options:
      displayMetadata: {}
      override:
        restrictedKeyValues:
          env_name: '#{environment.name}#'
          org_name: '{organization.name}'
          project_name: '#{environment.project.name}#'
        type: restricted_key_values
    value: env_name
    valueType: expression
