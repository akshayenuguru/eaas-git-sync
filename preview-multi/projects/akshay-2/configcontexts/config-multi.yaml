apiVersion: eaas.envmgmt.io/v1
kind: ConfigContext
metadata:
  name: config-multi
  project: akshay-2
spec:
  envs:
  - key: ev1
    options:
      override:
        multiSelect: true
        restrictedValues:
        - env1val1
        - env2val2
        - env3val3
        type: restricted
    value: env1val1
  - key: ev2
    options:
      override:
        multiSelect: true
        restrictedKeyValues:
          env2val1: one
          env2val2: two
          env2val3: three
        type: restricted_key_values
    value: env2val1
  variables:
  - name: iv1-text
    options:
      displayMetadata: {}
      override:
        multiSelect: true
        restrictedValues:
        - val1
        - val2
        - val3
        type: restricted
    valueType: text
  - name: inv2-json
    options:
      override:
        multiSelect: true
        restrictedValues:
        - val1
        - val2
        - val3
        type: restricted
    valueType: json
  - name: inv3-exp
    options:
      override:
        multiSelect: true
        restrictedValues:
        - '{environment.name}'
        - '{environment.project.name}'
        - '{organization.name}'
        type: restricted
    valueType: expression
  - name: iv4-text
    options:
      override:
        multiSelect: true
        restrictedKeyValues:
          key1: val1
          key2: val2
          key3: val3
        type: restricted_key_values
    valueType: text
  - name: iv5-exp
    options:
      override:
        multiSelect: true
        restrictedKeyValues:
          env_name: '{environment.name}'
          org_name: '{organization.name}'
          project_name: '{environment.project.name}'
        type: restricted_key_values
    valueType: expression
  - name: iv6-json
    options:
      override:
        multiSelect: true
        restrictedKeyValues:
          key1: val1
          key2: val2
          key3: val3
        type: restricted_key_values
    valueType: json
